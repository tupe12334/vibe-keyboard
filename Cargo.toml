[package]
name = "vibe-keyboard"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "listen"
path = "src/main.rs"

[dependencies]
mirajazz = "0.12.1"
tokio = { version = "1", features = ["full"] }
image = { version = "0.25", default-features = false, features = ["jpeg"] }
ratatui = "0.29"
crossterm = "0.28"
