[package]
name = "vibe-keyboard"
version = "0.1.0"
edition = "2021"
description = "Custom management system for Ajazz Stream Dock devices"
license = "MIT"

[[bin]]
name = "vibe-keyboard"
path = "src/main.rs"

[dependencies]
ajazz-sdk = "0.2.1"
hidapi = "2.6"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
image = "0.25"
clap = { version = "4", features = ["derive"] }
notify = "6"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[lints.clippy]
all = "deny"
